# ===== Nombre del microservicio =====
spring.application.name=ms-pagos

# ===== Puerto =====
server.port=8086

# ===== Conexión a la base de datos (MySQL en XAMPP) =====
spring.datasource.url=jdbc:mysql://localhost:3306/db_perfulandia_pagos?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# URL del MS Notificaciones para la comunicación
ms.notificaciones.url=http://localhost:8089